general {
    # Direct path to the quickshell binary and your specific lockscreen folder
    lock_cmd = /usr/bin/quickshell --path /home/manan/.config/quickshell/lockscreen/
    
    # Absolute path for the loginctl command
    before_sleep_cmd = /usr/bin/loginctl lock-session
}

listener {
    # 2-minute timer
    timeout = 120                                
    
    # Bypass loginctl and call the lockscreen binary directly with the absolute path
    on-timeout = /usr/bin/quickshell --path /home/manan/.config/quickshell/lockscreen/
}

listener {
    # 90-second timer for screen power management
    timeout = 90
    
    # Use absolute path for hyprctl to ensure the command executes
    on-timeout = /usr/bin/hyprctl dispatch dpms off
    on-resume = /usr/bin/hyprctl dispatch dpms on
}
